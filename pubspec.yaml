name: live_wallpaper_app
description: A beautiful live wallpaper app for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  video_player: ^2.8.2
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  animate_do: ^3.3.4
  lottie: ^3.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/wallpapers/
