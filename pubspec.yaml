name: live_wallpaper_app
description: Turn any video into a live wallpaper for your Android home screen.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  animate_do: ^3.3.4
  file_picker: ^8.1.2
  video_player: ^2.9.2
  video_compress: ^3.1.3
  path_provider: ^2.1.4
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
